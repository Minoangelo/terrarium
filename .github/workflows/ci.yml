name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "feat/**"
      - "hotfix/**"
      - "fix/**"
  pull_request:
    branches:
      - main
      - develop
      - "feature/**"
      - "feat/**"
      - "hotfix/**"
      - "fix/**"

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.11", "3.12", "3.13" ]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pylint build twine

      - name: Compile Python files
        run: python -m compileall .

      - name: Lint
        run: pylint main.py entities.py events.py persistence.py renderer.py state.py world.py

      - name: Run tests
        run: pytest

      - name: Build package
        run: python -m build

      - name: Validate package metadata
        run: python -m twine check dist/*
